<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoWS 전적 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg-deep: #0a0e17;
  --bg-panel: #111827;
  --bg-card: #1a2234;
  --bg-card-hover: #1f2a40;
  --border: #2a3650;
  --accent: #3b82f6;
  --accent-dim: #1e3a5f;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-muted: #475569;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  line-height: 1.5;
}

.noise {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }

/* Header */
.header {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 32px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; letter-spacing: 2px; color: var(--text);
}
.header span { font-size: 13px; color: var(--text-dim); }

/* Search */
.search-area {
  display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
}
.search-area input, .search-area select {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.search-area input:focus, .search-area select:focus { border-color: var(--accent); }
.search-area input::placeholder { color: var(--text-muted); }
#input-nick { flex: 1; min-width: 200px; }
#input-appid { width: 340px; }
.search-area select { width: 100px; cursor: pointer; }
.btn-search {
  background: var(--accent); color: #fff; border: none;
  padding: 10px 24px; border-radius: 6px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 500; font-size: 14px;
  transition: background 0.2s;
}
.btn-search:hover { background: #2563eb; }
.btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

.hint { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
.hint a { color: var(--accent); text-decoration: none; }

/* Status */
.status { text-align: center; padding: 40px 0; color: var(--text-dim); font-size: 14px; }
.status.error { color: var(--red); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Dashboard */
.dashboard { display: none; }

.player-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 28px;
}
.player-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
.player-header .player-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }

/* Overview cards */
.overview {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 32px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
  transition: background 0.2s;
}
.stat-card:hover { background: var(--bg-card-hover); }
.stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-card .value {
  font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 600;
}
.stat-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.wr-good { color: var(--green); }
.wr-avg { color: var(--gold); }
.wr-bad { color: var(--red); }

/* Sections */
.section { margin-bottom: 36px; }
.section-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  letter-spacing: 1px; margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}

/* Chart */
.chart-container {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px;
  max-height: 360px;
}
.chart-container canvas { max-height: 300px; }

/* Ship table */
.ship-controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.ship-controls input {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 6px;
  font-size: 13px; outline: none; flex: 1; min-width: 180px;
  font-family: 'Noto Sans KR', sans-serif;
}
.ship-controls input:focus { border-color: var(--accent); }
.ship-controls select {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 6px;
  font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}

.ship-table-wrap {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; overflow: auto; max-height: 520px;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { position: sticky; top: 0; z-index: 2; }
th {
  background: var(--bg-panel); color: var(--text-dim); font-weight: 500;
  padding: 10px 12px; text-align: left; white-space: nowrap;
  cursor: pointer; user-select: none; border-bottom: 1px solid var(--border);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
}
th:hover { color: var(--text); }
th .sort-arrow { margin-left: 4px; font-size: 10px; }
td {
  padding: 8px 12px; border-bottom: 1px solid #1a2234;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
}
tr:hover td { background: var(--bg-card-hover); }
td.ship-name { font-family: 'Noto Sans KR', sans-serif; font-weight: 500; white-space: nowrap; }
.tier { color: var(--gold); font-size: 11px; margin-right: 6px; }

.no-data { text-align: center; padding: 30px; color: var(--text-muted); }

.btn-snap {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim);
  padding: 4px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; margin-left: 10px; transition: all 0.2s;
}
.btn-snap:hover { border-color: var(--accent); color: var(--text); }
.btn-danger:hover { border-color: var(--red); color: var(--red); }

/* Responsive */
@media (max-width: 600px) {
  .search-area { flex-direction: column; }
  #input-appid { width: 100%; }
  .overview { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app">
  <div class="header">
    <h1>WOWS STATS</h1>
    <span>개인 전적 조회</span>
  </div>
  <div id="random-quote" style="font-size:13px;color:var(--text-muted);font-style:italic;margin:-20px 0 24px;padding-left:2px;"></div>

  <div class="search-area">
    <input id="input-appid" type="hidden" value="851d7ff3c975f3bec41d876e47889c68">
    <select id="input-region" style="display:none"><option value="asia" selected>ASIA</option></select>
    <input id="input-nick" type="hidden" value="time_and_tide">
    <button class="btn-search" id="btn-search" onclick="doSearch()">새로고침</button>
  </div>

  <div class="status" id="status"></div>

  <div class="dashboard" id="dashboard">
    <div class="player-header">
      <div>
        <h2 id="player-name"></h2>
        <div class="player-id" id="player-id"></div>
      </div>
    </div>

    <div class="overview" id="overview"></div>

    <div class="section">
      <div class="section-title">일별 기록 <button class="btn-snap" id="btn-snap" onclick="saveSnapshot()">오늘 기록 저장</button></div>
      <div id="snap-status" style="font-size:12px;color:var(--text-muted);margin-bottom:10px;"></div>
      <div class="overview" id="today-overview"></div>
      <div class="chart-container" id="daily-chart-wrap">
        <canvas id="chart-daily"></canvas>
      </div>
      <div class="ship-table-wrap" style="margin-top:12px;max-height:300px;">
        <table>
          <thead><tr><th>날짜</th><th>전투</th><th>승률</th><th>평균 뎀</th><th>평균 킬</th><th>평균 XP</th></tr></thead>
          <tbody id="daily-tbody"></tbody>
        </table>
      </div>
      <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <button class="btn-snap" onclick="exportSnapshots()">백업 저장</button>
          <button class="btn-snap" onclick="document.getElementById('import-file').click()">백업 불러오기</button>
          <input type="file" id="import-file" accept=".json" style="display:none" onchange="importSnapshots(event)">
        </div>
        <button class="btn-snap btn-danger" onclick="clearSnapshots()">기록 초기화</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">함종별 전적</div>
      <div class="chart-container">
        <canvas id="chart-type"></canvas>
      </div>
    </div>

    <div class="section">
      <div class="section-title">함선별 전적</div>
      <div class="ship-controls">
        <input id="ship-filter" placeholder="함선 이름 검색..." oninput="renderShipTable()">
        <select id="ship-sort" onchange="renderShipTable()">
          <option value="battles">전투 수</option>
          <option value="winrate">승률</option>
          <option value="avg_damage">평균 데미지</option>
          <option value="avg_frags">평균 킬</option>
          <option value="avg_xp">평균 경험치</option>
          <option value="tier">티어</option>
        </select>
        <label style="font-size:12px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="ship-hide-low" onchange="renderShipTable()"> 5티어 이상만
        </label>
      </div>
      <div class="ship-table-wrap">
        <table>
          <thead>
            <tr>
              <th>함선</th>
              <th>전투</th>
              <th>승률</th>
              <th>평균 뎀</th>
              <th>평균 킬</th>
              <th>평균 XP</th>
              <th>PR</th>
            </tr>
          </thead>
          <tbody id="ship-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const REGIONS = { asia: 'api.worldofwarships.asia', eu: 'api.worldofwarships.eu', com: 'api.worldofwarships.com', ru: 'api.worldofwarships.ru' };
let shipExpected = {};

// localStorage persistence
function loadSaved() {
  const appid = localStorage.getItem('wows_appid');
  const region = localStorage.getItem('wows_region');
  const nick = localStorage.getItem('wows_nick');
  if (appid) document.getElementById('input-appid').value = appid;
  if (region) document.getElementById('input-region').value = region;
  if (nick) document.getElementById('input-nick').value = nick;
}
function saveCreds() {
  localStorage.setItem('wows_appid', document.getElementById('input-appid').value.trim());
  localStorage.setItem('wows_region', document.getElementById('input-region').value);
  localStorage.setItem('wows_nick', document.getElementById('input-nick').value.trim());
}

// API helper
async function api(region, path, params) {
  const base = `https://${REGIONS[region]}`;
  const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
  const url = `${base}${path}?${qs}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.status !== 'ok') throw new Error(json.error?.message || 'API 오류');
  return json.data;
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.style.display = msg ? 'block' : 'none';
  el.className = 'status' + (isError ? ' error' : '');
  el.innerHTML = msg;
}

// Main search
async function doSearch() {
  const appid = document.getElementById('input-appid').value.trim();
  const region = document.getElementById('input-region').value;
  const nick = document.getElementById('input-nick').value.trim();
  if (!appid || !nick) { setStatus('application_id와 닉네임을 입력하세요.', true); return; }
  saveCreds();

  const btn = document.getElementById('btn-search');
  btn.disabled = true;
  document.getElementById('dashboard').style.display = 'none';
  setStatus('<span class="spinner"></span>조회 중...');

  try {
    // 1. Find player
    const searchData = await api(region, '/wows/account/list/', { application_id: appid, search: nick, limit: 1, type: 'exact' });
    if (!searchData || searchData.length === 0) { setStatus('플레이어를 찾을 수 없습니다.', true); btn.disabled = false; return; }
    const accountId = searchData[0].account_id;

    // 2. Get account info
    const accountData = await api(region, '/wows/account/info/', { application_id: appid, account_id: accountId, fields: 'nickname,created_at,statistics.pvp,last_battle_time' });
    const player = accountData[accountId];
    if (!player || player.hidden_profile) { setStatus('비공개 프로필입니다.', true); btn.disabled = false; return; }

    // 3. Get ship stats
    const shipStats = await api(region, '/wows/ships/stats/', { application_id: appid, account_id: accountId, fields: 'ship_id,pvp' });
    const ships = shipStats[accountId] || [];

    // 4. Get encyclopedia (ship names) - fetch all pages
    let allShips = {};
    let pageNo = 1;
    while (pageNo <= 20) {
      try {
        const encData = await api(region, '/wows/encyclopedia/ships/', { application_id: appid, fields: 'name,tier,type', page_no: pageNo });
        if (!encData || Object.keys(encData).length === 0) break;
        Object.assign(allShips, encData);
        pageNo++;
      } catch(e) {
        break;
      }
    }

    // Render
    renderDashboard(player, ships, allShips, accountId);
    autoSaveSnapshot();
    setStatus('');
    document.getElementById('dashboard').style.display = 'block';
  } catch (e) {
    console.error(e);
    setStatus('오류: ' + e.message, true);
  }
  btn.disabled = false;
}

function wrClass(wr) {
  if (wr >= 55) return 'wr-good';
  if (wr >= 48) return 'wr-avg';
  return 'wr-bad';
}

function fmt(n) { return n != null ? n.toLocaleString() : '-'; }
function pct(n) { return n != null ? n.toFixed(2) + '%' : '-'; }

// Render overview
function renderDashboard(player, ships, encyclopedia, accountId) {
  const pvp = player.statistics.pvp;
  document.getElementById('player-name').textContent = player.nickname;
  document.getElementById('player-id').textContent = `ID: ${accountId} · 가입: ${new Date(player.created_at * 1000).toLocaleDateString('ko')} · 마지막 전투: ${new Date(player.last_battle_time * 1000).toLocaleDateString('ko')}`;

  const battles = pvp.battles || 0;
  const wins = pvp.wins || 0;
  const wr = battles > 0 ? (wins / battles * 100) : 0;
  const avgDmg = battles > 0 ? Math.round(pvp.damage_dealt / battles) : 0;
  const avgXp = battles > 0 ? Math.round(pvp.xp / battles) : 0;
  const avgFrags = battles > 0 ? (pvp.frags / battles).toFixed(2) : '0';
  const kd = (pvp.survived_battles != null && battles - pvp.survived_battles > 0) ? (pvp.frags / (battles - pvp.survived_battles)).toFixed(2) : '-';
  const survRate = battles > 0 ? (pvp.survived_battles / battles * 100) : 0;
  const avgPlanes = battles > 0 ? (pvp.planes_killed / battles).toFixed(1) : '0';
  const maxDmg = pvp.max_damage_dealt || 0;
  const maxFrags = pvp.max_frags_battle || 0;
  const maxXp = pvp.max_xp || 0;

  const cards = [
    { label: '전투 수', value: fmt(battles) },
    { label: '승률', value: pct(wr), cls: wrClass(wr) },
    { label: '평균 데미지', value: fmt(avgDmg) },
    { label: '평균 XP', value: fmt(avgXp) },
    { label: '평균 킬', value: avgFrags },
    { label: 'K/D', value: kd },
    { label: '생존율', value: pct(survRate) },
    { label: '평균 격추', value: avgPlanes },
    { label: '최고 데미지', value: fmt(maxDmg), sub: pvp.max_damage_dealt_ship_id ? (encyclopedia[pvp.max_damage_dealt_ship_id]?.name || '') : '' },
    { label: '최고 킬', value: maxFrags + '킬', sub: pvp.max_frags_ship_id ? (encyclopedia[pvp.max_frags_ship_id]?.name || '') : '' },
    { label: '최고 XP', value: fmt(maxXp), sub: pvp.max_xp_ship_id ? (encyclopedia[pvp.max_xp_ship_id]?.name || '') : '' },
  ];

  document.getElementById('overview').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls || ''}">${c.value}</div>
      ${c.sub ? `<div class="sub">${c.sub}</div>` : ''}
    </div>
  `).join('');

  // Ships
  window._shipRows = ships.filter(s => s.pvp && s.pvp.battles > 0).map(s => {
    const p = s.pvp;
    const info = encyclopedia[s.ship_id] || {};
    return {
      name: info.name || `#${s.ship_id}`,
      tier: info.tier || 0,
      type: info.type || '',
      battles: p.battles,
      winrate: p.battles > 0 ? p.wins / p.battles * 100 : 0,
      avg_damage: p.battles > 0 ? Math.round(p.damage_dealt / p.battles) : 0,
      avg_frags: p.battles > 0 ? p.frags / p.battles : 0,
      avg_xp: p.battles > 0 ? Math.round(p.xp / p.battles) : 0,
    };
  });
  renderShipTable();
  renderTypeChart();

  // Store current stats for snapshot
  window._currentPvp = pvp;
  renderDailyTracking();
}

function renderShipTable() {
  const filter = document.getElementById('ship-filter').value.toLowerCase();
  const sortKey = document.getElementById('ship-sort').value;
  const hideLow = document.getElementById('ship-hide-low').checked;
  let rows = (window._shipRows || []).filter(r => r.name.toLowerCase().includes(filter));
  if (hideLow) rows = rows.filter(r => r.tier >= 5);
  rows.sort((a, b) => b[sortKey] - a[sortKey]);

  const tbody = document.getElementById('ship-tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="no-data">데이터 없음</td></tr>';
    return;
  }

  const tierLabel = t => t ? ['', 'I','II','III','IV','V','VI','VII','VIII','IX','X','★'][t] || t : '';

  tbody.innerHTML = rows.map(r => `<tr>
    <td class="ship-name"><span class="tier">${tierLabel(r.tier)}</span>${r.name}</td>
    <td>${fmt(r.battles)}</td>
    <td class="${wrClass(r.winrate)}">${pct(r.winrate)}</td>
    <td>${fmt(r.avg_damage)}</td>
    <td>${r.avg_frags.toFixed(2)}</td>
    <td>${fmt(r.avg_xp)}</td>
    <td>-</td>
  </tr>`).join('');
}

let typeChart = null;
function renderTypeChart() {
  const rows = window._shipRows || [];
  const TYPE_LABELS = { Destroyer: '구축함', Cruiser: '순양함', Battleship: '전함', AirCarrier: '항모', Submarine: '잠수함' };
  const TYPE_COLORS = { Destroyer: '#3b82f6', Cruiser: '#10b981', Battleship: '#ef4444', AirCarrier: '#f59e0b', Submarine: '#8b5cf6' };
  const types = {};
  rows.forEach(r => {
    const t = r.type || 'Unknown';
    if (!types[t]) types[t] = { battles: 0, wins: 0, damage: 0 };
    types[t].battles += r.battles;
    types[t].wins += Math.round(r.winrate * r.battles / 100);
    types[t].damage += r.avg_damage * r.battles;
  });

  const keys = Object.keys(types).filter(k => types[k].battles > 0);
  if (keys.length === 0) return;

  const labels = keys.map(k => TYPE_LABELS[k] || k);
  const battleData = keys.map(k => types[k].battles);
  const wrData = keys.map(k => +(types[k].wins / types[k].battles * 100).toFixed(1));
  const dmgData = keys.map(k => Math.round(types[k].damage / types[k].battles));
  const colors = keys.map(k => TYPE_COLORS[k] || '#64748b');

  const ctx = document.getElementById('chart-type').getContext('2d');
  if (typeChart) typeChart.destroy();
  typeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '전투 수', data: battleData, backgroundColor: colors.map(c => c + '99'), borderRadius: 4, yAxisID: 'y' },
        { label: '승률 (%)', data: wrData, type: 'line', borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', tension: 0.3, pointRadius: 5, pointBackgroundColor: '#f59e0b', yAxisID: 'y1' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,

// === Daily Snapshot Tracking ===
const SNAP_KEY = 'wows_snapshots';

function getSnapshots() {
  try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; }
}

function saveSnapshot() {
  const pvp = window._currentPvp;
  if (!pvp) { document.getElementById('snap-status').textContent = '먼저 전적을 조회하세요.'; return; }
  const today = new Date().toISOString().split('T')[0];
  const snaps = getSnapshots();
  const existing = snaps.findIndex(s => s.date === today);
  const entry = {
    date: today,
    battles: pvp.battles || 0,
    wins: pvp.wins || 0,
    damage_dealt: pvp.damage_dealt || 0,
    frags: pvp.frags || 0,
    xp: pvp.xp || 0,
    survived_battles: pvp.survived_battles || 0,
  };
  if (existing >= 0) {
    snaps[existing] = entry;
    document.getElementById('snap-status').textContent = `${today} 기록 업데이트됨`;
  } else {
    snaps.push(entry);
    snaps.sort((a,b) => a.date.localeCompare(b.date));
    document.getElementById('snap-status').textContent = `${today} 기록 저장됨`;
  }
  localStorage.setItem(SNAP_KEY, JSON.stringify(snaps));
  renderDailyTracking();
}

function clearSnapshots() {
  if (!confirm('모든 일별 기록을 삭제하시겠습니까?')) return;
  localStorage.removeItem(SNAP_KEY);
  renderDailyTracking();
}

function autoSaveSnapshot() {
  const pvp = window._currentPvp;
  if (!pvp) return;
  const today = new Date().toISOString().split('T')[0];
  const snaps = getSnapshots();
  if (snaps.some(s => s.date === today)) return; // already saved today
  snaps.push({
    date: today,
    battles: pvp.battles || 0,
    wins: pvp.wins || 0,
    damage_dealt: pvp.damage_dealt || 0,
    frags: pvp.frags || 0,
    xp: pvp.xp || 0,
    survived_battles: pvp.survived_battles || 0,
  });
  snaps.sort((a,b) => a.date.localeCompare(b.date));
  localStorage.setItem(SNAP_KEY, JSON.stringify(snaps));
  document.getElementById('snap-status').textContent = `${today} 자동 저장됨`;
  renderDailyTracking();
}

function exportSnapshots() {
  const snaps = getSnapshots();
  if (snaps.length === 0) { alert('저장된 기록이 없습니다.'); return; }
  const blob = new Blob([JSON.stringify(snaps, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wows-snapshots-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importSnapshots(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported) || !imported[0]?.date || !imported[0]?.battles) throw new Error('invalid');
      const existing = getSnapshots();
      // Merge: imported + existing, deduplicate by date (imported wins)
      const map = {};
      existing.forEach(s => map[s.date] = s);
      imported.forEach(s => map[s.date] = s);
      const merged = Object.values(map).sort((a,b) => a.date.localeCompare(b.date));
      localStorage.setItem(SNAP_KEY, JSON.stringify(merged));
      document.getElementById('snap-status').textContent = `${imported.length}개 기록 불러옴 (총 ${merged.length}일)`;
      renderDailyTracking();
    } catch(err) {
      alert('올바른 백업 파일이 아닙니다.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

let dailyChart = null;
function renderDailyTracking() {
  const snaps = getSnapshots();
  const tbody = document.getElementById('daily-tbody');
  const chartWrap = document.getElementById('daily-chart-wrap');
  const todayEl = document.getElementById('today-overview');

  // Today's stats: compare latest snapshot with current live data
  const pvp = window._currentPvp;
  if (pvp && snaps.length >= 1) {
    const last = snaps[snaps.length - 1];
    const db = (pvp.battles || 0) - last.battles;
    if (db > 0) {
      const dw = (pvp.wins || 0) - last.wins;
      const dd = (pvp.damage_dealt || 0) - last.damage_dealt;
      const df = (pvp.frags || 0) - last.frags;
      const dx = (pvp.xp || 0) - last.xp;
      const dsurv = ((pvp.survived_battles || 0) - (last.survived_battles || 0));
      const wr = +(dw / db * 100).toFixed(1);
      const deaths = db - dsurv;
      const kd = deaths > 0 ? (df / deaths).toFixed(2) : df.toFixed(2);
      const sr = +(dsurv / db * 100).toFixed(1);
      const todayCards = [
        { label: '전투 수', value: db },
        { label: '승률', value: wr + '%', cls: wrClass(wr) },
        { label: '평균 데미지', value: fmt(Math.round(dd / db)) },
        { label: '평균 XP', value: fmt(Math.round(dx / db)) },
        { label: '평균 킬', value: (df / db).toFixed(2) },
        { label: 'K/D', value: kd },
        { label: '생존율', value: sr + '%' },
      ];
      todayEl.innerHTML = '<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px;">마지막 저장 이후 전적</div>' +
        todayCards.map(c => `<div class="stat-card"><div class="label">${c.label}</div><div class="value ${c.cls||''}">${c.value}</div></div>`).join('') +
        `<div style="grid-column:1/-1;font-size:13px;color:var(--text-muted);font-style:italic;padding:8px 0 0;">${getPerfQuote({battles:db, winrate:wr, avg_damage:Math.round(dd/db)})}</div>`;
    } else {
      todayEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">마지막 저장 이후 전투 없음</div>';
    }
  } else {
    todayEl.innerHTML = '';
  }

  if (snaps.length < 2) {
    tbody.innerHTML = `<tr><td colspan="6" class="no-data">${snaps.length === 0 ? '저장된 기록이 없습니다. "오늘 기록 저장"을 눌러 시작하세요.' : '기록이 2일 이상 쌓여야 일별 변화를 볼 수 있습니다.'}</td></tr>`;
    chartWrap.style.display = 'none';
    return;
  }

  // Compute daily deltas
  const days = [];
  for (let i = 1; i < snaps.length; i++) {
    const prev = snaps[i-1], cur = snaps[i];
    const db = cur.battles - prev.battles;
    if (db <= 0) continue;
    const dw = cur.wins - prev.wins;
    const dd = cur.damage_dealt - prev.damage_dealt;
    const df = cur.frags - prev.frags;
    const dx = cur.xp - prev.xp;
    days.push({
      date: cur.date,
      battles: db,
      winrate: +(dw / db * 100).toFixed(1),
      avg_damage: Math.round(dd / db),
      avg_frags: +(df / db).toFixed(2),
      avg_xp: Math.round(dx / db),
    });
  }

  // Table (newest first)
  if (days.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-data">기간 내 전투 기록 없음</td></tr>';
    chartWrap.style.display = 'none';
    return;
  }

  tbody.innerHTML = [...days].reverse().map(d => `<tr>
    <td>${d.date.slice(5)}</td>
    <td>${d.battles}</td>
    <td class="${wrClass(d.winrate)}">${d.winrate}%</td>
    <td>${fmt(d.avg_damage)}</td>
    <td>${d.avg_frags}</td>
    <td>${fmt(d.avg_xp)}</td>
  </tr>`).join('');

  // Chart
  chartWrap.style.display = 'block';
  const ctx = document.getElementById('chart-daily').getContext('2d');
  if (dailyChart) dailyChart.destroy();
  dailyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: days.map(d => d.date.slice(5)),
      datasets: [
        { label: '평균 데미지', data: days.map(d => d.avg_damage), backgroundColor: 'rgba(59,130,246,0.6)', borderRadius: 3, yAxisID: 'y', order: 2 },
        { label: '승률 (%)', data: days.map(d => d.winrate), type: 'line', borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', tension: 0.3, pointRadius: 4, pointBackgroundColor: '#f59e0b', yAxisID: 'y1', order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
        tooltip: { callbacks: { afterBody(items) { const i = items[0].dataIndex; return `전투 수: ${days[i].battles}`; } } }
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' } },
        y: { position: 'left', ticks: { color: '#3b82f6', font: { size: 10 } }, grid: { color: '#1e293b' }, title: { display: true, text: '평균 데미지', color: '#3b82f6', font: { size: 11 } } },
        y1: { position: 'right', min: 0, max: 100, ticks: { color: '#f59e0b', font: { size: 10 } }, grid: { display: false }, title: { display: true, text: '승률 %', color: '#f59e0b', font: { size: 11 } } },
      }
    }
  });
}

function getRandomQuote() {
  return RANDOM_QUOTES[Math.floor(Math.random() * RANDOM_QUOTES.length)];
}

function getPerfQuote(stats) {
  // stats: { battles, winrate, avg_damage }
  let pool = [];
  if (stats.battles >= 20) pool.push(...PERF_QUOTES.many_battles);
  else if (stats.battles <= 3) pool.push(...PERF_QUOTES.low_battles);
  if (stats.avg_damage >= 60000) pool.push(...PERF_QUOTES.high_dmg);
  if (stats.winrate >= 60) pool.push(...PERF_QUOTES.great_wr);
  else if (stats.winrate >= 52) pool.push(...PERF_QUOTES.good_wr);
  else if (stats.winrate >= 45) pool.push(...PERF_QUOTES.avg_wr);
  else pool.push(...PERF_QUOTES.bad_wr);
  return pool[Math.floor(Math.random() * pool.length)];
}
